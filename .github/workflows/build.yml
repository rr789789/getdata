name: build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Download modules
        run: go mod download all

      - name: Run tests
        run: go test -mod=mod ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, windows]
        goarch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Download modules
        run: go mod download all

      - name: Build binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            ext=".exe"
          fi
          output="dist/mvp-platform_${{ matrix.goos }}_${{ matrix.goarch }}${ext}"
          GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" CGO_ENABLED=0 \
            go build -mod=mod -trimpath -ldflags "-s -w" -o "${output}" ./cmd/mvp-platform

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mvp-platform_${{ matrix.goos }}_${{ matrix.goarch }}
          path: dist/*
